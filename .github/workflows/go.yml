# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
          go-version-file: 'go.mod'

    - name: Build
      run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -a -ldflags '-extldflags "-static"' -o docker-proxy main.go

    - name: Test
      run: go test -v ./...

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
          name: docker-proxy-binary
          path: docker-proxy
